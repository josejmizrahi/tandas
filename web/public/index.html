<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0d" />
    <title>Ruul</title>
    <meta name="description" content="Ruul — coordina dinero, reglas y decisiones con tu grupo." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='80'%3E🧭%3C/text%3E%3C/svg%3E" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #0b0b0d;
        color: #f4f4f5;
        font: 17px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 24px;
      }
      main { max-width: 480px; text-align: center; }
      h1 { font-size: 44px; letter-spacing: -0.02em; margin: 0 0 16px; }
      p { color: #a1a1aa; margin: 12px 0; }
      .pill {
        display: inline-block;
        padding: 4px 10px;
        background: rgba(244, 244, 245, 0.08);
        border-radius: 999px;
        font-size: 13px;
        color: #d4d4d8;
        margin-bottom: 24px;
      }
      footer {
        position: fixed;
        bottom: 16px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 13px;
        color: #71717a;
      }
      footer a { color: inherit; text-decoration: none; margin: 0 8px; }
      footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <span class="pill">Pronto</span>
      <h1>Ruul</h1>
      <p>Coordina dinero, reglas y decisiones con tu grupo.</p>
      <p>iOS · pronto en App Store</p>
    </main>
    <footer>
      <a href="/legal/terms">Términos</a>
      ·
      <a href="/legal/privacy">Privacidad</a>
    </footer>
  </body>
</html>
