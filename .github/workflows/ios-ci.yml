name: iOS CI

on:
  push:
    branches: [main, ios-rewrite]
  pull_request:
    branches: [main, ios-rewrite]

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      TANDAS_SUPABASE_URL: ${{ secrets.TANDAS_SUPABASE_URL }}
      TANDAS_SUPABASE_ANON_KEY: ${{ secrets.TANDAS_SUPABASE_ANON_KEY }}
      RUUL_QR_SECRET: ${{ secrets.RUUL_QR_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Show Xcode + SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Write local xcconfig from secrets
        run: |
          # xcconfig treats `//` as a comment; escape to `/$()/` so
          # `https://host` survives substitution into Info.plist.
          URL_ESCAPED=$(echo "$TANDAS_SUPABASE_URL" | sed 's|//|/$()/|')
          cat > ios/Tandas.local.xcconfig <<EOF
          TANDAS_SUPABASE_URL = $URL_ESCAPED
          TANDAS_SUPABASE_ANON_KEY = $TANDAS_SUPABASE_ANON_KEY
          RUUL_QR_SECRET = ${RUUL_QR_SECRET:-test-qr-secret-for-ci-only}
          EOF

      - name: Generate project
        run: cd ios && xcodegen

      - name: Build & test
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS=CI sets a compile-time
        # `#if CI` flag the test bundle picks up. Used by
        # PrimitiveSnapshotTests.skipOnCI() to gate the two
        # RuulMoneyView snapshots that can't survive Xcode minor-SDK
        # font-rendering drift (CI is on macos-15 / Xcode 26.3; local
        # devs are on 26.4+). Three prior attempts (env var on runner,
        # TEST_RUNNER_CI=true) didn't propagate to the iOS Simulator
        # test process — compile-time flag is the only channel that
        # actually reaches the test bundle for iOS unit tests.
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/Tandas.xcodeproj \
            -scheme Tandas \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) CI' \
            | xcpretty || (xcodebuild test \
                -project ios/Tandas.xcodeproj \
                -scheme Tandas \
                -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
                CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' \
                SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) CI')
