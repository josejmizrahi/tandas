name: iOS CI

on:
  push:
    branches: [main, ios-rewrite]
  pull_request:
    branches: [main, ios-rewrite]

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      TANDAS_SUPABASE_URL: ${{ secrets.TANDAS_SUPABASE_URL }}
      TANDAS_SUPABASE_ANON_KEY: ${{ secrets.TANDAS_SUPABASE_ANON_KEY }}
      RUUL_QR_SECRET: ${{ secrets.RUUL_QR_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache SwiftPM (resolución + checkouts de dependencias)
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('ios/**/Package.swift', 'ios/**/Package.resolved', 'ios/project.yml') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Show Xcode + SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Write local xcconfig from secrets
        run: |
          # xcconfig treats `//` as a comment; escape to `/$()/` so
          # `https://host` survives substitution into Info.plist.
          URL_ESCAPED=$(echo "$TANDAS_SUPABASE_URL" | sed 's|//|/$()/|')
          cat > ios/Tandas.local.xcconfig <<EOF
          TANDAS_SUPABASE_URL = $URL_ESCAPED
          TANDAS_SUPABASE_ANON_KEY = $TANDAS_SUPABASE_ANON_KEY
          RUUL_QR_SECRET = ${RUUL_QR_SECRET:-test-qr-secret-for-ci-only}
          EOF

      - name: Generate project
        run: cd ios && xcodegen

      - name: RuulCore package tests
        # Los tests del contrato MVP2 (decoding, error mapping, mock client,
        # stores) viven en el package RuulCore. xcodebuild contra el
        # Package.swift usa el scheme auto-generado del package.
        run: |
          set -o pipefail
          cd ios/Packages/RuulCore
          xcodebuild test \
            -scheme RuulCore \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' \
            | xcpretty || (xcodebuild test \
                -scheme RuulCore \
                -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
                CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='')

      - name: Build & test
        # SWIFT_ACTIVE_COMPILATION_CONDITIONS=CI deja disponible `#if CI`
        # para tests que necesiten gatearse en CI.
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/Tandas.xcodeproj \
            -scheme Tandas \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) CI' \
            | xcpretty || (xcodebuild test \
                -project ios/Tandas.xcodeproj \
                -scheme Tandas \
                -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
                CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY='' \
                SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) CI')
