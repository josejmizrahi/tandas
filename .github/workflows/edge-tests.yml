name: edge-tests

# MVP 2.0 (post-reset): valida que la cadena de migrations mvp2_* replaye
# desde cero y corre todos los smokes _smoke_mvp2_* contra la DB local.
#
# Las edge functions de la era anterior fueron archivadas en
# supabase/functions_archive_pre_mvp2/ (el MVP no usa edge functions:
# rule engine es SQL síncrono, sin push notifications).

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/edge-tests.yml"

jobs:
  db:
    name: e2e + db (local supabase)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (replays mvp2 migration chain)
        # `supabase start` aplica todas las migrations de supabase/migrations/.
        # Si la cadena no replaya desde cero, este paso falla — es el gate principal.
        run: supabase start

      - name: Run MVP2 smokes
        # Ejecuta todas las funciones _smoke_mvp2_* que la cadena haya creado.
        # Cualquier excepción dentro de un smoke tumba el job.
        run: |
          status=$(supabase status -o json)
          DB_URL=$(echo "$status" | jq -r .DB_URL)
          psql "$DB_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE
            fn record;
            n  integer := 0;
          BEGIN
            FOR fn IN
              SELECT p.proname
                FROM pg_proc p
                JOIN pg_namespace ns ON ns.oid = p.pronamespace
               WHERE ns.nspname = 'public'
                 AND p.proname LIKE '\_smoke\_mvp2\_%' ESCAPE '\'
               ORDER BY p.proname
            LOOP
              RAISE NOTICE 'running %', fn.proname;
              EXECUTE format('SELECT public.%I()', fn.proname);
              n := n + 1;
            END LOOP;
            RAISE NOTICE 'mvp2 smokes green: %', n;
          END $$;
          SQL

      - name: Stop local Supabase
        if: always()
        run: supabase stop || true
