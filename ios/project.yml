name: Tandas
options:
  bundleIdPrefix: com.josejmizrahi
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: es
  groupSortPosition: top
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Tandas.local.xcconfig
  Release: Tandas.local.xcconfig
settings:
  base:
    DEVELOPMENT_TEAM: G3TMTFSG7S
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Tandas/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Tandas/Resources/Tandas.entitlements
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.josejmizrahi.ruul
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "3"
    TANDAS_SUPABASE_URL: $(inherited)
    TANDAS_SUPABASE_ANON_KEY: $(inherited)
    SENTRY_DSN: $(inherited)
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.20.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.40.0"
  RuulUI:
    path: Packages/RuulUI
  RuulCore:
    path: Packages/RuulCore
  RuulFeatures:
    path: Packages/RuulFeatures
targets:
  Tandas:
    type: application
    platform: iOS
    sources:
      - path: Tandas
        excludes:
          - "Resources/Info.plist"
          - "Resources/Tandas.entitlements"
    resources:
      - path: Tandas/Resources/Assets.xcassets
      - path: Tandas/Resources/Fonts
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Sentry
        product: Sentry
      - package: RuulUI
        product: RuulUI
      - package: RuulCore
        product: RuulCore
      - package: RuulFeatures
        product: RuulFeatures
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
  TandasTests:
    type: bundle.unit-test
    platform: iOS
    sources: TandasTests
    dependencies:
      - target: Tandas
      - package: SnapshotTesting
        product: SnapshotTesting
      - package: RuulUI
        product: RuulUI
      - package: RuulCore
        product: RuulCore
      - package: RuulFeatures
        product: RuulFeatures
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tandas.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tandas"
  TandasUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: TandasUITests
    dependencies:
      - target: Tandas
schemes:
  Tandas:
    build:
      targets:
        Tandas: all
        TandasTests: [test]
        TandasUITests: [test]
    test:
      targets:
        - TandasTests
        - TandasUITests
      gatherCoverageData: true
