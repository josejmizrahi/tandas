name: Tandas
options:
  bundleIdPrefix: com.josejmizrahi
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: es
  groupSortPosition: top
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    # TODO(Task 20): set DEVELOPMENT_TEAM before archive for TestFlight
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Tandas/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Tandas/Resources/Tandas.entitlements
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: com.josejmizrahi.tandas
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.20.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
targets:
  Tandas:
    type: application
    platform: iOS
    sources:
      - path: Tandas
        excludes:
          - "Resources/Info.plist"
          - "Resources/Tandas.entitlements"
    resources:
      - path: Tandas/Resources/Assets.xcassets
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
  TandasTests:
    type: bundle.unit-test
    platform: iOS
    sources: TandasTests
    dependencies:
      - target: Tandas
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tandas.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Tandas"
  TandasUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: TandasUITests
    dependencies:
      - target: Tandas
schemes:
  Tandas:
    build:
      targets:
        Tandas: all
        TandasTests: [test]
        TandasUITests: [test]
    test:
      targets:
        - TandasTests
        - TandasUITests
      gatherCoverageData: true
